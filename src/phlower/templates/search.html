{% extends "base.html" %}
{% block title %}Search — phlower{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Search invocations</h1>
</div>

<form class="search-form"
      hx-get="/ui/partials/search-results"
      hx-target="#search-results"
      hx-trigger="submit"
      hx-indicator="#search-spinner">
  <div class="search-row">
    <input type="text" name="task_name" placeholder="Task name">
    <input type="text" name="task_id" placeholder="Task ID">
    <select name="status">
      <option value="">Any status</option>
      <option value="SUCCESS">Success</option>
      <option value="FAILURE">Failure</option>
      <option value="RETRY">Retry</option>
      <option value="STARTED">Started</option>
    </select>
    <input type="text" name="worker" placeholder="Worker">
    <input type="text" name="queue" placeholder="Queue">
  </div>
  <div class="search-row">
    <input type="text" name="q" placeholder="Free-text search (args, kwargs, errors&hellip;)" class="wide">
    <button type="submit">Search</button>
    <span id="search-spinner" class="htmx-indicator">searching&hellip;</span>
  </div>
</form>

<div id="search-results">
  {% include 'partials/search_results.html' %}
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}phlower{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/node_modules/htmx.org/dist/htmx.min.js"></script>
  <script src="/static/node_modules/htmx-ext-sse/sse.js"></script>
  <script src="/static/node_modules/idiomorph/dist/idiomorph.min.js"></script>
  <script src="/static/node_modules/idiomorph/dist/idiomorph-htmx.js"></script>
  <script src="/static/app.js"></script>
  {% block head %}{% endblock %}
</head>
<body hx-ext="morph">
  <nav class="topbar">
    <a href="/" class="logo">phlower</a>
    <div class="nav-links">
      <a href="/">Tasks</a>
      <a href="/search">Search</a>
    </div>
    <div class="nav-status"
         hx-get="/ui/partials/broker-status"
         hx-trigger="load, every 5s"
         hx-swap="morph:innerHTML">
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
